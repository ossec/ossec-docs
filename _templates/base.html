{% extends "furo/base.html" %}

{% block body %}
<div class="ossec-header">
    <div class="ossec-header-left">
        <a href="{{ pathto(master_doc) }}">
            <img src="{{ pathto('_static/ossec_logo_bare_small.png', 1) }}" alt="OSSEC" class="ossec-header-logo">
        </a>
        <nav class="ossec-header-nav">
            <a href="https://www.ossec.net/about/">About</a>
            <a href="https://www.ossec.net/register-for-ossec/">Get OSSEC+</a>
            <a href="https://www.ossec.net/downloads/">Downloads</a>
        </nav>
    </div>
    <div class="ossec-header-right">
        <form class="ossec-top-search" action="{{ pathto('search') }}" method="get">
            <input type="text" name="q" placeholder="Search documentation..." aria-label="Search">
            <input type="hidden" name="check_keywords" value="yes">
            <input type="hidden" name="area" value="default">
            <button type="submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
                </svg>
            </button>
        </form>
        <a href="https://bsky.app/profile/ossec.bsky.social" target="_blank" class="ossec-header-social"
            title="Follow OSSEC on Bluesky">
            <svg viewBox="0 0 512 512" width="24" height="24" fill="currentColor">
                <path
                    d="M407.8 84.4c-42.8 30.6-88.8 91.7-111.8 112.4-1.2 1.1-2.6 1.1-3.8 0-23.1-20.7-69-81.8-111.8-112.4C122.3 43.1 48 31.7 48 93.6c0 12.8 6.9 83.2 10.9 98.1 13.1 48.7 61.1 61.7 106.6 54.5-94.8 16.7-117.5 73-42.1 130.6 85.1 65 119.8 17.1 131.1-13.8 1.4-3.8 3.5-3.8 4.9 0 11.3 30.8 45.9 78.8 131.1 13.8 75.4-57.6 52.8-113.9-42.1-130.6 45.5 7.1 93.5-5.8 106.6-54.5 4-14.9 10.9-85.3 10.9-98.1 0-61.9-74.3-50.5-132.4-9.2z" />
            </svg>
        </a>
    </div>
</div>
{{ super() }}
{% endblock %}
