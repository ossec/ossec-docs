{% extends "furo/base.html" %}

{% block body %}
<div class="ossec-header">
    <div class="ossec-header-left">
        <a href="{{ pathto(master_doc) }}">
            <img src="{{ pathto('_static/ossec_logo_bare_small.png', 1) }}" alt="OSSEC" class="ossec-header-logo">
        </a>
        <nav class="ossec-header-nav">
            <a href="https://www.ossec.net/about/">About</a>
            <a href="https://www.ossec.net/docs/">Documentation</a>
            <a href="https://www.ossec.net/register-for-ossec/">Get OSSEC+</a>
            <a href="https://www.ossec.net/downloads/">Downloads</a>
        </nav>
    </div>
    <div class="ossec-header-right">
        <form class="ossec-top-search" action="{{ pathto('search') }}" method="get">
            <input type="text" name="q" placeholder="Search documentation..." aria-label="Search">
            <input type="hidden" name="check_keywords" value="yes">
            <input type="hidden" name="area" value="default">
            <button type="submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
            </button>
        </form>
    </div>
</div>
{{ super() }}
{% endblock %}
